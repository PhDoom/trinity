{{!-- Quintessence & Paradox Partial - Foundry V13 Compliant --}}
<div class="mage-resources-section mb-2">
  
  {{!-- Only render if the actor is a Mage --}}
  {{#if (eq system.subType "mage")}}
  <div class="grid grid-2col flex-group-center border p-1">
    
    {{!-- Quintessence Pool --}}
    <div class="resource flexcol flex-center border-right">
      <label class="resource-label">Quintessence</label>
      <div class="flexrow flex-center">
        <input type="number" 
               name="system.mage.quintessence.value" 
               value="{{system.mage.quintessence.value}}" 
               data-dtype="Number" 
               style="max-width: 3rem; text-align: center;" 
               title="Current Quintessence" />
        <span class="px-1"> / </span>
        <input type="number" 
               name="system.mage.quintessence.max" 
               value="{{system.mage.quintessence.max}}" 
               data-dtype="Number" 
               style="max-width: 3rem; text-align: center;" 
               title="Maximum Quintessence" />
      </div>
    </div>

    {{!-- Paradox Pool --}}
    <div class="resource flexcol flex-center">
      <label class="resource-label rollable" data-roll-type="paradox" title="Roll Paradox Backlash">
        Paradox
      </label>
      <div class="flexrow flex-center">
        <input type="number" 
               name="system.mage.paradox.value" 
               value="{{system.mage.paradox.value}}" 
               data-dtype="Number" 
               style="max-width: 3rem; text-align: center;" 
               title="Current Paradox" />
        <span class="px-1"> / </span>
        <input type="number" 
               name="system.mage.paradox.max" 
               value="{{system.mage.paradox.max}}" 
               data-dtype="Number" 
               style="max-width: 3rem; text-align: center;" 
               title="Paradox Threshold" />
      </div>
    </div>

  </div>
  {{/if}}

</div>
