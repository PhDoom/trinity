{{!-- Health Boxes Partial (Variant 2) - Foundry V13 Compliant --}}
<div class="health-section-v2 mb-2">
  <h3 class="header">Health & Damage</h3>
  
  <div class="grid grid-2col border p-1">
    
    {{!-- Max Health Input --}}
    <div class="resource flexrow flex-between flex-center p-1">
      <label class="resource-label">Max Health</label>
      <input type="number" 
             name="system.health.max" 
             value="{{system.health.max}}" 
             data-dtype="Number" 
             style="max-width: 3rem;"/>
    </div>

    {{!-- Bashing Damage Input --}}
    <div class="resource flexrow flex-between flex-center p-1">
      <label class="resource-label">Bashing</label>
      <input type="number" 
             name="system.health.bashing" 
             value="{{system.health.bashing}}" 
             data-dtype="Number" 
             style="max-width: 3rem;"/>
    </div>

    {{!-- Lethal Damage Input --}}
    <div class="resource flexrow flex-between flex-center p-1">
      <label class="resource-label">Lethal</label>
      <input type="number" 
             name="system.health.lethal" 
             value="{{system.health.lethal}}" 
             data-dtype="Number" 
             style="max-width: 3rem;"/>
    </div>

    {{!-- Aggravated Damage Input --}}
    <div class="resource flexrow flex-between flex-center p-1">
      <label class="resource-label">Aggravated</label>
      <input type="number" 
             name="system.health.aggravated" 
             value="{{system.health.aggravated}}" 
             data-dtype="Number" 
             style="max-width: 3rem;"/>
    </div>

  </div>

  {{!-- Health State Summary --}}
  <div class="flex-group-center mt-1">
    <span class="resource-label">Current Wound Total: {{system.health.value}}</span>
  </div>
</div>
