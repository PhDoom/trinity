{{!-- Full Data Partial - Foundry V13 Compliant --}}
<div class="full-data-section">
    <h3 class="header">Core System Data</h3>

    {{!-- Core Attributes --}}
    <div class="grid grid-3col mb-2">
        {{#each system.attributes as |attr key|}}
        <div class="resource flex-group-center p-1 border">
            <label class="resource-label">{{attr.label}}</label>
            <input type="number" name="system.attributes.{{key}}.value" value="{{attr.value}}" data-dtype="Number"/>
        </div>
        {{/each}}
    </div>

    <hr>

    {{!-- V13 Health & Defense Stats --}}
    <div class="grid grid-4col mb-2">
        <div class="resource flex-group-center">
            <label class="resource-label">Defense</label>
            <input type="number" name="system.defense.value" value="{{system.defense.value}}" data-dtype="Number"/>
        </div>
        <div class="resource flex-group-center">
            <label class="resource-label">Resilience</label>
            <input type="number" name="system.resilience.value" value="{{system.resilience.value}}" data-dtype="Number"/>
        </div>
        <div class="resource flex-group-center">
            <label class="resource-label">Initiative</label>
            <input type="number" name="system.initiative.value" value="{{system.initiative.value}}" data-dtype="Number"/>
        </div>
        <div class="resource flex-group-center">
            <label class="resource-label">Armor</label>
            <input type="number" name="system.armor.value" value="{{system.armor.value}}" data-dtype="Number"/>
        </div>
    </div>

    <hr>

    {{!-- Roll Settings - Fully restored based on your V13 template.json --}}
    <h4 class="header">Global Roll Settings</h4>
    <div class="grid grid-3col">
        <div class="resource flex-group-center">
            <label class="resource-label">Target Number</label>
            <input type="number" name="system.rollSettings.targetNumber.value" value="{{system.rollSettings.targetNumber.value}}" data-dtype="Number"/>
        </div>
        <div class="resource flex-group-center">
            <label class="resource-label">Double Success</label>
            <input type="number" name="system.rollSettings.doubleSuccess.value" value="{{system.rollSettings.doubleSuccess.value}}" data-dtype="Number"/>
        </div>
        <div class="resource flex-group-center">
            <label class="resource-label">Explode Threshold</label>
            <input type="number" name="system.rollSettings.explodeThreshold.value" value="{{system.rollSettings.explodeThreshold.value}}" data-dtype="Number"/>
        </div>
    </div>

    <div class="grid grid-3col mt-1">
        <div class="resource flex-group-center">
            <label class="resource-label">Success Threshold</label>
            <input type="number" name="system.rollSettings.successThreshold.value" value="{{system.rollSettings.successThreshold.value}}" data-dtype="Number"/>
        </div>
        <div class="resource flex-group-center">
            <label class="resource-label">Narrative Scale</label>
            <input type="number" name="system.rollSettings.narrativeScale.value" value="{{system.rollSettings.narrativeScale.value}}" data-dtype="Number"/>
        </div>
        <div class="resource flex-group-center">
            <label class="resource-label">Dramatic Scale</label>
            <input type="number" name="system.rollSettings.dramaticScale.value" value="{{system.rollSettings.dramaticScale.value}}" data-dtype="Number"/>
        </div>
    </div>

</div>
