{{!-- Psion Resource Partial (Variant 1) - Foundry V13 Compliant --}}
<div class="psion-section-v1 mb-2">
  
  {{!-- Only render if the actor is a Psion --}}
  {{#if (eq system.subType "psion")}}
  <div class="flexcol border p-1">
    
    {{!-- Psi Rating Row --}}
    <div class="resource flexrow flex-between flex-center mb-1">
      <label class="resource-label rollable" data-roll-type="psi" title="Roll Psi">Psi Rating</label>
      <input type="number" 
             name="system.psion.psi.value" 
             value="{{system.psion.psi.value}}" 
             data-dtype="Number" 
             style="max-width: 3rem; text-align: center;" />
    </div>

    <hr>

    {{!-- Tolerance Pool Row --}}
    <div class="resource flexrow flex-between flex-center mt-1">
      <label class="resource-label">Tolerance</label>
      <div class="flexrow flex-center" style="max-width: 7rem;">
        <input type="number" 
               name="system.psion.tolerance.value" 
               value="{{system.psion.tolerance.value}}" 
               data-dtype="Number" 
               style="text-align: center;" />
        <span class="px-1"> / </span>
        <input type="number" 
               name="system.psion.tolerance.max" 
               value="{{system.psion.tolerance.max}}" 
               data-dtype="Number" 
               style="text-align: center;" />
      </div>
    </div>

  </div>
  {{/if}}

</div>
