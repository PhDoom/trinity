{{!-- Inspiration Partial - Foundry V13 Compliant --}}
<div class="talent-traits-section">
  
  <h3 class="header">Talent Traits</h3>
  
  <div class="flexcol mb-1">
    
    {{!-- Inspiration (Current/Max Pool) --}}
    <div class="form-group flexcol flex-center border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
      <label class="font-weight-bold text-blue mb-1 rollable" data-roll-type="inspiration" title="Roll Inspiration" style="cursor: pointer;">Inspiration</label>
      
      <div class="flexrow mb-1 align-center" style="gap: 10px; justify-content: center;" title="Current Inspiration">
        <span class="font-weight-bold text-blue" style="font-size: 0.85em; width: 65px; text-align: right; text-transform: uppercase;">Current</span>
        {{!-- Flex-wrap set to nowrap to prevent second-line wrapping --}}
        <div class="pip-container" data-name="system.talent.inspiration.value" data-value="{{system.talent.inspiration.value}}" style="display: flex; flex-wrap: nowrap; gap: 2px;">
            <i class="pip {{#if (gt system.talent.inspiration.value 0)}}fas{{else}}far{{/if}} fa-circle" data-index="1"></i>
            <i class="pip {{#if (gt system.talent.inspiration.value 1)}}fas{{else}}far{{/if}} fa-circle" data-index="2"></i>
            <i class="pip {{#if (gt system.talent.inspiration.value 2)}}fas{{else}}far{{/if}} fa-circle" data-index="3"></i>
            <i class="pip {{#if (gt system.talent.inspiration.value 3)}}fas{{else}}far{{/if}} fa-circle" data-index="4"></i>
            <i class="pip {{#if (gt system.talent.inspiration.value 4)}}fas{{else}}far{{/if}} fa-circle" data-index="5"></i>
            <i class="pip {{#if (gt system.talent.inspiration.value 5)}}fas{{else}}far{{/if}} fa-circle" data-index="6"></i>
            <i class="pip {{#if (gt system.talent.inspiration.value 6)}}fas{{else}}far{{/if}} fa-circle" data-index="7"></i>
            <i class="pip {{#if (gt system.talent.inspiration.value 7)}}fas{{else}}far{{/if}} fa-circle" data-index="8"></i>
            <i class="pip {{#if (gt system.talent.inspiration.value 8)}}fas{{else}}far{{/if}} fa-circle" data-index="9"></i>
            <i class="pip {{#if (gt system.talent.inspiration.value 9)}}fas{{else}}far{{/if}} fa-circle" data-index="10"></i>
        </div>
      </div>

      <div class="flexrow align-center" style="gap: 10px; justify-content: center;" title="Maximum Inspiration">
        <span class="font-weight-bold text-blue" style="font-size: 0.85em; width: 65px; text-align: right; text-transform: uppercase;">Maximum</span>
        {{!-- Flex-wrap set to nowrap to prevent second-line wrapping --}}
        <div class="pip-container" data-name="system.talent.inspiration.max" data-value="{{system.talent.inspiration.max}}" style="display: flex; flex-wrap: nowrap; gap: 2px;">
            <i class="pip {{#if (gt system.talent.inspiration.max 0)}}fas{{else}}far{{/if}} fa-square" data-index="1"></i>
            <i class="pip {{#if (gt system.talent.inspiration.max 1)}}fas{{else}}far{{/if}} fa-square" data-index="2"></i>
            <i class="pip {{#if (gt system.talent.inspiration.max 2)}}fas{{else}}far{{/if}} fa-square" data-index="3"></i>
            <i class="pip {{#if (gt system.talent.inspiration.max 3)}}fas{{else}}far{{/if}} fa-square" data-index="4"></i>
            <i class="pip {{#if (gt system.talent.inspiration.max 4)}}fas{{else}}far{{/if}} fa-square" data-index="5"></i>
            <i class="pip {{#if (gt system.talent.inspiration.max 5)}}fas{{else}}far{{/if}} fa-square" data-index="6"></i>
            <i class="pip {{#if (gt system.talent.inspiration.max 6)}}fas{{else}}far{{/if}} fa-square" data-index="7"></i>
            <i class="pip {{#if (gt system.talent.inspiration.max 7)}}fas{{else}}far{{/if}} fa-square" data-index="8"></i>
            <i class="pip {{#if (gt system.talent.inspiration.max 8)}}fas{{else}}far{{/if}} fa-square" data-index="9"></i>
            <i class="pip {{#if (gt system.talent.inspiration.max 9)}}fas{{else}}far{{/if}} fa-square" data-index="10"></i>
        </div>
      </div>
    </div>

  </div>
</div>
