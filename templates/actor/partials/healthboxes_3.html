{{!-- Health Boxes Partial (Variant 3) - Foundry V13 Compliant --}}
<div class="health-section-v3 mb-1">
  <div class="flexrow flex-group-center border-bottom pb-1">
    
    {{!-- Max Health --}}
    <div class="resource flexrow flex-center px-1">
      <label class="resource-label mr-1">Max</label>
      <input type="number" 
             name="system.health.max" 
             value="{{system.health.max}}" 
             data-dtype="Number" 
             style="max-width: 2.5rem; text-align: center;" />
    </div>

    {{!-- Bashing --}}
    <div class="resource flexrow flex-center px-1">
      <label class="resource-label mr-1" title="Bashing Damage">B</label>
      <input type="number" 
             name="system.health.bashing" 
             value="{{system.health.bashing}}" 
             data-dtype="Number" 
             style="max-width: 2rem; text-align: center;" />
    </div>

    {{!-- Lethal --}}
    <div class="resource flexrow flex-center px-1">
      <label class="resource-label mr-1" title="Lethal Damage">L</label>
      <input type="number" 
             name="system.health.lethal" 
             value="{{system.health.lethal}}" 
             data-dtype="Number" 
             style="max-width: 2rem; text-align: center;" />
    </div>

    {{!-- Aggravated --}}
    <div class="resource flexrow flex-center px-1">
      <label class="resource-label mr-1" title="Aggravated Damage">A</label>
      <input type="number" 
             name="system.health.aggravated" 
             value="{{system.health.aggravated}}" 
             data-dtype="Number" 
             style="max-width: 2rem; text-align: center;" />
    </div>

  </div>
</div>
