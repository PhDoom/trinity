        <label class="font-weight-bold text-center mb-1">Number of<br>Bruised Boxes</label>
        <input type="number" name="system.health.bruisedBoxes" value="{{system.health.bruisedBoxes}}" data-dtype="Number" style="width: 50px; text-align: center; font-size: 1.2em;"/>
      </div>
      
      <div class="form-group flexcol p-1 border" style="border-radius: 5px; background: rgba(0,0,0,0.02); align-items: center;">

      </div>
