<div class="injury-conditions-section p-1 border">
  <h3 class="header">Injury Conditions</h3>
  
  <div class="flexcol gap-5">
    
    {{!-- BRUISED TRACK --}}
    <div class="flexrow flex-between align-center border-bottom pb-1">
      <div class="flexrow align-center">
        <label class="font-weight-bold mr-1">Bruised (+1)</label>
        <a class="add-health-box text-blue" data-type="bruised" title="Left-click to add, Right-click to remove"><i class="fas fa-plus"></i></a>
      </div>
      <div class="health-checkboxes flexrow gap-5">
        {{!-- Number input hidden visually, represented by a pip/counter if needed, or simply checkboxes --}}
        <input type="number" name="system.health.bruised.value" value="{{system.health.bruised.value}}" min="0" max="{{system.health.bruised.max}}" class="w-25 text-center">
        <span class="align-self-center">/ {{system.health.bruised.max}}</span>
      </div>
    </div>

    {{!-- INJURED TRACK --}}
    <div class="flexrow flex-between align-center border-bottom pb-1">
      <div class="flexrow align-center">
        <label class="font-weight-bold mr-1">Injured (+2)</label>
        <a class="add-health-box text-blue" data-type="injured" title="Left-click to add, Right-click to remove"><i class="fas fa-plus"></i></a>
      </div>
      <div class="health-checkboxes flexrow gap-5">
        <input type="number" name="system.health.injured.value" value="{{system.health.injured.value}}" min="0" max="{{system.health.injured.max}}" class="w-25 text-center">
        <span class="align-self-center">/ {{system.health.injured.max}}</span>
      </div>
    </div>

    {{!-- MAIMED --}}
    <div class="flexrow flex-between align-center border-bottom pb-1">
      <label class="font-weight-bold">Maimed (+4)</label>
      <input type="checkbox" name="system.health.maimed.value" {{checked system.health.maimed.value}}>
    </div>

    {{!-- TAKEN OUT --}}
    <div class="flexrow flex-between align-center">
      <label class="font-weight-bold text-red">Taken Out</label>
      <input type="checkbox" name="system.health.takenOut.value" {{checked system.health.takenOut.value}}>
    </div>

  </div>
</div>
