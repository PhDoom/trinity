{{!-- Aethernaut Deviations Drag-and-Drop Area --}}
  <div class="powers-section mt-2">
      <div class="flexrow flex-between header p-1 border-bottom" style="border-bottom-color: #2e7d32;">
          <h3 class="m-0" style="color: #2e7d32;">Deviations</h3>
          <a class="item-create" style="color: #2e7d32; cursor: pointer;" data-type="deviation" title="Create New Deviation"><i class="fas fa-plus"></i> Add</a>
      </div>
      
      <div class="power-list p-1 border" style="border-color: #a5d6a7; border-radius: 5px;">
          {{#if deviations.length}}
              {{#each deviations as |item id|}}
              <div class="item flexrow flex-between p-1 border-bottom align-center" data-item-id="{{item._id}}" style="padding: 3px 0;">
                  <div class="item-name flexrow align-center">
                      <img src="{{item.img}}" title="Click to view {{item.name}}" class="item-edit" width="24" height="24" style="cursor: pointer; margin-right: 8px; border-radius: 3px; border: 1px solid #ccc; object-fit: cover; flex: 0 0 24px;"/>
                      <h4 class="m-0 rollable" data-roll-type="item" title="Roll {{item.name}}" style="line-height: 24px; cursor: pointer;">
                          <a>{{item.name}}</a>
                      </h4>
                  </div>
                  <div class="flexrow align-center">
                      <span class="tag mx-1" style="padding: 2px 8px;">Cost: {{item.system.cost}}</span>
                      <div class="item-controls flexrow flex-center ml-1">
                          <a class="item-control item-delete text-red" title="Delete Item"><i class="fas fa-trash"></i></a>
                      </div>
                  </div>
              </div>
              {{/each}}
          {{else}}
              <em style="color: #666;">Drag and drop Deviations here, or click '+ Add'.</em>
          {{/if}}
      </div>
  </div>
