{{!-- Nova Resource Partial - Foundry V13 Compliant --}}
<div class="nova-section mb-2">
  
  {{!-- Only render if the actor is a Nova --}}
  {{#if (eq system.subType "nova")}}
  <div class="grid grid-2col flex-group-center border p-1">
    
    {{!-- Quantum (Static Rating) --}}
    <div class="resource flexcol flex-center">
      <label class="resource-label rollable" data-roll-type="quantum" title="Roll Quantum">Quantum</label>
      <input type="number" 
             name="system.nova.quantum.value" 
             value="{{system.nova.quantum.value}}" 
             data-dtype="Number" 
             style="max-width: 3rem; text-align: center;" />
    </div>

    {{!-- Flux (Resource/Risk Pool) --}}
    <div class="resource flexcol flex-center">
      <label class="resource-label">Flux</label>
      <div class="flexrow flex-center">
        <input type="number" 
               name="system.nova.flux.value" 
               value="{{system.nova.flux.value}}" 
               data-dtype="Number" 
               style="max-width: 3rem; text-align: center;" />
        {{!-- Max Flux is usually 10 or derived, but included here for consistency --}}
        <span class="px-1"> / </span>
        <input type="number" 
               name="system.nova.flux.max" 
               value="{{system.nova.flux.max}}" 
               data-dtype="Number" 
               style="max-width: 3rem; text-align: center;" />
      </div>
    </div>

  </div>
  {{/if}}

</div>
