{{!-- Defense Partial (Variant 1) - Foundry V13 Compliant --}}
<div class="defense-section">
  
  <h3 class="header">Defense & Resilience</h3>
  
  <div class="defense-list flexcol mb-1">
    
    {{!-- Defense Value Row --}}
    <div class="resource flexrow flex-between flex-center mb-1">
      <label for="system.defense.value" class="resource-label">Defense</label>
      <input type="number" 
             name="system.defense.value" 
             value="{{system.defense.value}}" 
             data-dtype="Number" 
             style="max-width: 4rem; text-align: center;" />
    </div>
    
    {{!-- Resilience Value Row --}}
    <div class="resource flexrow flex-between flex-center mb-1">
      <label for="system.resilience.value" class="resource-label">Resilience</label>
      <input type="number" 
             name="system.resilience.value" 
             value="{{system.resilience.value}}" 
             data-dtype="Number" 
             style="max-width: 4rem; text-align: center;" />
    </div>
    
  </div>

</div>
