{{!-- Focus Dialog - Foundry V13 Compliant --}}
<form class="trinity-dialog focus-dialog">
  <div class="flexcol border p-2">
    
    <p class="notes mb-2">Adjust the focus and situational modifiers for this action.</p>

    {{!-- Focus Level Input --}}
    <div class="form-group flexrow flex-between mb-1">
      <label class="font-weight-bold">Focus Rating</label>
      <div class="flexrow flex-center" style="max-width: 100px;">
        <input type="number" 
               name="focusValue" 
               value="{{focus}}" 
               data-dtype="Number" 
               style="text-align: center;" />
      </div>
    </div>

    {{!-- Difficulty/Situational Modifier --}}
    <div class="form-group flexrow flex-between mb-1">
      <label class="font-weight-bold">Difficulty</label>
      <div class="flexrow flex-center" style="max-width: 100px;">
        <input type="number" 
               name="difficulty" 
               value="{{difficulty}}" 
               data-dtype="Number" 
               style="text-align: center;" />
      </div>
    </div>

    <hr>

    {{!-- Conditional: Special Bonus (If passed from actor) --}}
    {{#if bonus}}
    <div class="form-group flexrow flex-between">
      <label>Additional Bonus</label>
      <span class="px-2 font-weight-bold">+{{bonus}}</span>
    </div>
    {{/if}}

  </div>
</form>
