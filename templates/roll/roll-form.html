{{!-- Trinity Roll Form - Foundry V13 Compliant --}}
<form class="trinity-dialog roll-form" autocomplete="off">
  
  {{!-- Header --}}
  <header class="dialog-header border-bottom mb-2 trinity-flexrow trinity-flex-between p-2">
    <h3 class="m-0">Configure Action</h3>
    <div class="action-badge">
      <input type="text" name="system.actionType" value="{{system.actionType}}" placeholder="Action Type" class="text-center"/>
    </div>
  </header>

  {{!-- Configuration Grid --}}
  <div class="trinity-grid trinity-grid-2col mb-3">
    
    <div class="trinity-flexcol border p-2">
      <label class="small-label font-weight-bold">Base Pool</label>
      <input type="number" name="system.basePool" value="{{system.basePool}}" data-dtype="Number" class="text-center"/>
    </div>

    <div class="trinity-flexcol border p-2">
      <label class="small-label font-weight-bold">Enhancement</label>
      <input type="number" name="system.enhancement" value="{{system.enhancement}}" data-dtype="Number" class="text-center"/>
    </div>

    <div class="trinity-flexcol border p-2">
      <label class="small-label font-weight-bold">Difficulty</label>
      <input type="number" name="system.difficulty" value="{{system.difficulty}}" data-dtype="Number" class="text-center"/>
    </div>

    <div class="trinity-flexcol border p-2">
      <label class="small-label font-weight-bold">Scale</label>
      <input type="number" name="system.scale" value="{{system.scale}}" data-dtype="Number" class="text-center"/>
    </div>
  </div>

  {{!-- Toggles --}}
  <div class="trinity-flexcol border-top pt-2">
    <div class="trinity-flexrow trinity-flex-between p-1">
      <label class="small">Specialty Action</label>
      <input type="checkbox" name="system.isSpecialty" {{checked system.isSpecialty}}/>
    </div>
    <div class="trinity-flexrow trinity-flex-between p-1">
      <label class="small">Allow Momentum</label>
      <input type="checkbox" name="system.allowMomentum" {{checked system.allowMomentum}}/>
    </div>
  </div>

  {{!-- Rich Text Description --}}
  <div class="form-group mt-2">
    <label class="small-label font-weight-bold">Action Description</label>
    {{editor enrichedDescription target="system.description" button=true owner=owner editable=editable engine="prosemirror"}}
  </div>

</form>
