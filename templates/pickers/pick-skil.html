{{!-- Skill Picker Dialog - Foundry V13 Compliant --}}
<form class="trinity-dialog picker flexcol" autocomplete="off">
  
  <div class="form-group mb-2">
    <label class="font-weight-bold block mb-1 text-center">Select a Skill</label>
    <p class="notes italic small text-center mb-2">Choose the Skill to use for this action.</p>
    
    <div class="form-fields">
      <select name="skillSelect" class="w-100">
        {{#select selected}}
          <option value="">None (Attribute Only)</option>
          
          {{!-- V13 Item Fetching Logic --}}
          {{#each actor.itemTypes.skill as |skill|}}
            <option value="{{skill.id}}">
              {{skill.name}} ({{skill.system.value}} {{#if skill.system.subType}}- {{skill.system.subType}}{{/if}})
            </option>
          {{else}}
            <option value="" disabled>No skills found on character sheet</option>
          {{/each}}
          
        {{/select}}
      </select>
    </div>
  </div>

  {{!-- Manual Skill/Specialty Bonus --}}
  <div class="form-group flexrow flex-center p-1 border-top mt-1">
    <label class="small font-weight-bold mr-2">Additional Specialty/Bonus</label>
    <input type="number" name="skillBonus" value="0" data-dtype="Number" style="width: 50px; text-align: center;"/>
  </div>

</form>
