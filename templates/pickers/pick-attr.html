{{!-- Attribute Picker Dialog - Foundry V13 Compliant --}}
<form class="trinity-dialog picker flexcol" autocomplete="off">
  
  <div class="form-group mb-2">
    <label class="font-weight-bold block mb-1 text-center">Select an Attribute</label>
    <p class="notes italic small text-center mb-2">Choose the Attribute to combine with your action or skill.</p>
    
    <div class="form-fields">
      <select name="attributeSelect" class="w-100">
        {{#select selected}}
          {{!-- V13 Object Structure Alignment --}}
          
          <optgroup label="Physical Arena">
            <option value="system.attributes.might">Might ({{system.attributes.might.value}})</option>
            <option value="system.attributes.dexterity">Dexterity ({{system.attributes.dexterity.value}})</option>
            <option value="system.attributes.stamina">Stamina ({{system.attributes.stamina.value}})</option>
          </optgroup>

          <optgroup label="Mental Arena">
            <option value="system.attributes.intellect">Intellect ({{system.attributes.intellect.value}})</option>
            <option value="system.attributes.cunning">Cunning ({{system.attributes.cunning.value}})</option>
            <option value="system.attributes.resolve">Resolve ({{system.attributes.resolve.value}})</option>
          </optgroup>

          <optgroup label="Social Arena">
            <option value="system.attributes.presence">Presence ({{system.attributes.presence.value}})</option>
            <option value="system.attributes.manipulation">Manipulation ({{system.attributes.manipulation.value}})</option>
            <option value="system.attributes.composure">Composure ({{system.attributes.composure.value}})</option>
          </optgroup>
          
        {{/select}}
      </select>
    </div>
  </div>

</form>
