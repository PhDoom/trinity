{{!-- Trinity Secondary Roll Prompt - Foundry V13 Compliant --}}
<form class="trinity-dialog roll-prompt-secondary" autocomplete="off">
  
  {{!-- Dialog Header --}}
  <header class="dialog-header border-bottom mb-2 trinity-flexrow trinity-flex-between p-2">
    <h3 class="m-0">Modifier Configuration</h3>
    <div class="pool-modifier">
      <span class="small-label">Modified Pool:</span> 
      <span class="text-purple font-weight-bold">{{totalPool}}</span>
    </div>
  </header>

  {{!-- Adjustment Grid --}}
  <div class="adjustments-group trinity-grid trinity-grid-2col border-top pt-2">
    
    <div class="form-group trinity-flexcol trinity-flex-center">
      <label class="small-label">Scale Adjustment</label>
      <input type="number" name="scale" value="{{scale}}" data-dtype="Number" class="text-center w-50"/>
    </div>

    <div class="form-group trinity-flexcol trinity-flex-center">
      <label class="small-label">Complications</label>
      <input type="number" name="complication" value="{{complication}}" data-dtype="Number" class="text-center w-50"/>
    </div>

  </div>

  {{!-- Secondary Options --}}
  <div class="options-section trinity-flexcol mt-2 border-top pt-2">
    <div class="trinity-flexrow trinity-flex-between p-1">
      <label class="small">Add Contextual Bonus</label>
      <input type="checkbox" name="contextBonus" {{checked contextBonus}}/>
    </div>
    <div class="trinity-flexrow trinity-flex-between p-1">
      <label class="small">Ignore Complications</label>
      <input type="checkbox" name="ignoreComplication" {{checked ignoreComplication}}/>
    </div>
  </div>

  <p class="notes small italic text-center mt-2">
    These modifiers will be applied to your final dice pool calculation.
  </p>

</form>
