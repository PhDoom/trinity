{{!-- Trinity Save Action Prompt - Foundry V13 Compliant --}}
<form class="trinity-dialog save-as-prompt" autocomplete="off">
  
  {{!-- Save Header --}}
  <header class="dialog-header border-bottom mb-2 trinity-flexrow trinity-flex-between p-2 bg-grey">
    <h3 class="m-0">Save Action to Sheet</h3>
  </header>

  {{!-- Configuration Section --}}
  <div class="form-group mb-2">
    <label class="small-label font-weight-bold">Action Name</label>
    <input type="text" name="name" value="{{name}}" placeholder="Enter action name..." class="w-100"/>
  </div>

  {{!-- Mechanics Grid --}}
  <div class="mechanics-grid trinity-grid trinity-grid-2col border-top pt-2 mb-2">
    
    {{!-- Dice Pool --}}
    <div class="trinity-flexcol trinity-flex-center p-1">
      <span class="small-label">Dice Pool</span>
      <span class="font-weight-bold">{{pool}}</span>
    </div>

    {{!-- Enhancement --}}
    <div class="trinity-flexcol trinity-flex-center p-1">
      <span class="small-label">Enhancement</span>
      <input type="number" name="enhancement" value="{{enhancement}}" data-dtype="Number" class="text-center w-50"/>
    </div>

  </div>

  {{!-- Category Tagging --}}
  <div class="form-group border-top mt-2 pt-2">
    <label class="small-label font-weight-bold">Action Category</label>
    <select name="subType" class="w-100">
      <option value="combat" {{#eq subType 'combat'}}selected{{/eq}}>Combat</option>
      <option value="social" {{#eq subType 'social'}}selected{{/eq}}>Social</option>
      <option value="mental" {{#eq subType 'mental'}}selected{{/eq}}>Mental</option>
      <option value="exploration" {{#eq subType 'exploration'}}selected{{/eq}}>Exploration</option>
    </select>
  </div>

</form>
