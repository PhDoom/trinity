<form class="trinity-app {{cssClass}} flexcol" autocomplete="off">

    {{!-- ITEM HEADER --}}
    <header class="sheet-header flexrow p-1 border-bottom align-center">
        <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" height="64" width="64" style="object-fit: cover; flex: 0 0 auto;"/>
        <div class="header-fields flexcol w-100 mx-1">
            <h1 class="charname m-0">
                <input name="name" type="text" value="{{item.name}}" placeholder="Contact Name"/>
            </h1>
            
            {{!-- 0-5 Pip Tracker for the Contact Rating --}}
            <div class="flexrow align-center mt-1">
                <label class="font-weight-bold mr-1 text-blue">Rating</label>
                <div class="pip-container" data-name="system.rating" data-value="{{system.rating}}">
                    <i class="pip {{#if (gt system.rating 0)}}fas{{else}}far{{/if}} fa-circle" data-index="1"></i>
                    <i class="pip {{#if (gt system.rating 1)}}fas{{else}}far{{/if}} fa-circle" data-index="2"></i>
                    <i class="pip {{#if (gt system.rating 2)}}fas{{else}}far{{/if}} fa-circle" data-index="3"></i>
                    <i class="pip {{#if (gt system.rating 3)}}fas{{else}}far{{/if}} fa-circle" data-index="4"></i>
                    <i class="pip {{#if (gt system.rating 4)}}fas{{else}}far{{/if}} fa-circle" data-index="5"></i>
                </div>
            </div>
        </div>
    </header>

    {{!-- ITEM TABS --}}
    <nav class="sheet-tabs tabs mt-1" data-group="primary">
        <a class="item active" data-tab="description">Description</a>
    </nav>

    {{!-- ITEM BODY --}}
    <section class="sheet-body p-1" style="flex: 1 1 auto; overflow-y: auto;">

        {{!-- Description Tab (Rich Text Editor) --}}
        <div class="tab description h-100 active" data-group="primary" data-tab="description">
            <div class="p-1 border" style="background: rgba(0,0,0,0.02); min-height: 350px; height: 100%;">
                {{editor enrichedDescription target="system.description" button=true owner=owner editable=editable engine="prosemirror"}}
            </div>
        </div>

    </section>
</form>
