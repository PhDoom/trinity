<form class="trinity-app {{cssClass}} flexcol" autocomplete="off">
    <header class="sheet-header flexrow p-1 border-bottom align-center">
        <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" style="width: 48px; height: 48px; min-width: 48px; max-width: 48px; flex: 0 0 48px; object-fit: cover; border-radius: 3px; border: 1px solid #ccc;"/>
        <div class="header-fields flexcol w-100 mx-1">
            <h1 class="charname m-0">
                <input name="name" type="text" value="{{item.name}}" placeholder="Buff Name"/>
            </h1>
        </div>
    </header>

    <section class="sheet-body p-1 flexcol" style="flex: 1 1 auto; overflow-y: auto;">
        
        <div class="form-group flexrow align-center border p-1 mb-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
            <label class="font-weight-bold text-blue mr-1">Rating</label>
            <div class="pip-container" data-name="system.rating" data-value="{{system.rating}}">
                <i class="pip {{#if (gt system.rating 0)}}fas{{else}}far{{/if}} fa-circle" data-index="1"></i>
                <i class="pip {{#if (gt system.rating 1)}}fas{{else}}far{{/if}} fa-circle" data-index="2"></i>
                <i class="pip {{#if (gt system.rating 2)}}fas{{else}}far{{/if}} fa-circle" data-index="3"></i>
                <i class="pip {{#if (gt system.rating 3)}}fas{{else}}far{{/if}} fa-circle" data-index="4"></i>
                <i class="pip {{#if (gt system.rating 4)}}fas{{else}}far{{/if}} fa-circle" data-index="5"></i>
            </div>
        </div>

        <div class="form-group flexcol border p-1 mb-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
            <label class="font-weight-bold text-blue mb-1">Level</label>
            <input type="text" name="system.level" value="{{system.level}}" placeholder="e.g. 1, Minor, etc."/>
        </div>

        <div class="form-group flexcol mt-1" style="flex: 1;">
            <label class="font-weight-bold text-blue mb-1">Description</label>

            <!-- THE CSS FIX: Height set to 750px for a massive reading and typing area -->
            <style>
                .trinity-app prose-mirror {
                    display: block;
                    width: 100%;
                    min-height: 750px;
                    background: rgba(0,0,0,0.02);
                    border: 1px solid #ccc;
                    border-radius: 5px;
                    padding: 5px;
                    box-sizing: border-box;
                }
            </style>

            <div class="editor" style="width: 100%;">
                {{editor enrichedDescription target="system.description" button=false owner=owner editable=editable engine="prosemirror"}}
            </div>
        </div>
        
    </section>
</form>
