<form class="trinity-app {{cssClass}} flexcol" autocomplete="off">
    <header class="sheet-header flexrow p-1 border-bottom align-center">
        <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" style="width: 48px; height: 48px; min-width: 48px; max-width: 48px; flex: 0 0 48px; object-fit: cover; border-radius: 3px; border: 1px solid #ccc;"/>
        <div class="header-fields flexcol w-100 mx-1">
            <h1 class="charname m-0">
                <input name="name" type="text" value="{{item.name}}" placeholder="Armor Name"/>
            </h1>
        </div>
    </header>

    <section class="sheet-body p-1 flexcol" style="flex: 1 1 auto; overflow-y: auto;">
        <div class="grid grid-3col gap-10 mb-1">
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Base</label>
                <input type="text" name="system.base" value="{{system.base}}" placeholder="e.g. Kevlar..."/>
            </div>
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Hard</label>
                <input type="number" name="system.hard" value="{{system.hard}}" data-dtype="Number" style="text-align: center;"/>
            </div>
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Soft</label>
                <input type="number" name="system.soft" value="{{system.soft}}" data-dtype="Number" style="text-align: center;"/>
            </div>
        </div>

        <div class="form-group flexcol mb-1 border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
            <label class="font-weight-bold text-blue mb-1">Tags & Special Rules</label>
            <input type="text" name="system.tags" value="{{system.tags}}" placeholder="Enter armor tags here..."/>
        </div>

        <div class="form-group flexcol mt-1" style="flex: 1;">
            <label class="font-weight-bold text-blue mb-1">Description</label>
            
            <!-- Fallback Textarea -->
            <textarea name="system.description" placeholder="Type raw text here if the rich editor fails..." style="min-height: 80px; width: 100%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; padding: 5px; font-family: sans-serif;">{{system.description}}</textarea>

            <!-- Debug Data: This will tell us if your item-sheet.js is working -->
            <p style="font-size: 10px; color: gray;">DEBUG -> Editable: {{editable}} | Owner: {{owner}}</p>

            <!-- Fully Loaded V13 Rich Text Editor -->
            <div class="editor border p-1" style="background: rgba(0,0,0,0.02); min-height: 200px; border-radius: 5px;">
                {{editor enrichedDescription target="system.description" button=true owner=owner editable=editable engine="prosemirror"}}
            </div>
        </div>
    </section>
</form>
