{{!-- Item Dots Display Toggle Partial - Foundry V13 Compliant --}}
<div class="form-group dots-flag-setting mb-2">
    
    <label class="resource-label font-weight-bold">Display as Dots</label>
    
    <div class="form-fields flexrow flex-center">
        {{!-- V13 Data Path: system.flags.isDots --}}
        <input type="checkbox" 
               name="system.flags.isDots" 
               {{checked system.flags.isDots}} 
               data-dtype="Boolean" />
        
        <p class="notes px-2 italic small">
            If enabled, this item's rating will be rendered as dots (e.g., Edges, Backgrounds).
        </p>
    </div>

</div>
