{{!-- Generic Item Configuration Partial - Foundry V13 Compliant --}}
<div class="item-flag-settings border p-2 mb-2">
    
    <h3 class="header border-bottom mb-2">Item Properties</h3>

    <div class="grid grid-2col">
        {{!-- V13 Data Path: system.quantity --}}
        <div class="form-group flexrow p-1">
            <label class="resource-label font-weight-bold">Quantity</label>
            <div class="form-fields">
                <input type="number" 
                       name="system.quantity" 
                       value="{{system.quantity}}" 
                       data-dtype="Number" 
                       placeholder="1" 
                       style="text-align: center;" />
            </div>
        </div>

        {{!-- V13 Data Path: system.value (Used for Cost or Rating) --}}
        <div class="form-group flexrow p-1">
            <label class="resource-label font-weight-bold">Cost / Rating</label>
            <div class="form-fields">
                <input type="number" 
                       name="system.value" 
                       value="{{system.value}}" 
                       data-dtype="Number" 
                       placeholder="0" 
                       style="text-align: center;" />
            </div>
        </div>
    </div>

    {{!-- V13 Data Path: system.source --}}
    <div class="form-group flexrow mt-1">
        <label class="resource-label">Source/Book</label>
        <div class="form-fields">
            <input type="text" 
                   name="system.source" 
                   value="{{system.source}}" 
                   placeholder="e.g. Core Rulebook" />
        </div>
    </div>

</div>
