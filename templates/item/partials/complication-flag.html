{{!-- Item Complication Setting Partial - Foundry V13 Compliant --}}
<div class="form-group complication-setting mb-2">
    
    <label class="resource-label font-weight-bold">Complication Value</label>
    
    <div class="form-fields flexrow flex-center">
        {{!-- V13 Data Path: system.complication --}}
        <input type="number" 
               name="system.complication" 
               value="{{system.complication}}" 
               data-dtype="Number" 
               placeholder="0" 
               style="max-width: 3rem; text-align: center;" 
               title="The complication threshold or value for this item." />
        
        <p class="notes px-2 italic small">
            Base difficulty or risk associated with using this item.
        </p>
    </div>

</div>
