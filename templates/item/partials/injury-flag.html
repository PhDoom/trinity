{{!-- Item Injury Setting Partial - Foundry V13 Compliant --}}
<div class="injury-setting border p-2 mb-2">
    
    <h3 class="header border-bottom mb-2">Injury Details</h3>

    {{!-- V13 Data Path: system.penalty --}}
    <div class="form-group flexrow mb-1">
        <label class="resource-label font-weight-bold">Dice Penalty</label>
        <div class="form-fields flexrow flex-center" style="max-width: 80px;">
            <input type="number" 
                   name="system.penalty" 
                   value="{{system.penalty}}" 
                   data-dtype="Number" 
                   placeholder="0" 
                   style="text-align: center;" 
                   title="Dice pool reduction caused by this injury" />
        </div>
    </div>

    {{!-- V13 Data Path: system.severity --}}
    <div class="form-group flexrow mb-1">
        <label class="resource-label font-weight-bold">Severity Level</label>
        <div class="form-fields flexrow flex-center" style="max-width: 80px;">
            <input type="number" 
                   name="system.severity" 
                   value="{{system.severity}}" 
                   data-dtype="Number" 
                   placeholder="1" 
                   style="text-align: center;" 
                   title="1 = Minor, 2 = Maimed, 3 = Taken Out" />
        </div>
    </div>

    <p class="notes italic small mt-1">
        Injuries are automatically applied to relevant dice pools based on their penalty value.
    </p>

</div>
