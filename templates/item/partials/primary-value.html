{{!-- Item Primary Value (Rating) Partial - Foundry V13 Compliant --}}
<div class="form-group primary-value-setting mb-2">
    
    <label class="resource-label font-weight-bold">Primary Rating / Dots</label>
    
    <div class="form-fields flexrow flex-center">
        {{!-- V13 Data Path: system.value --}}
        <input type="number" 
               name="system.value" 
               value="{{system.value}}" 
               data-dtype="Number" 
               placeholder="0" 
               style="max-width: 3rem; text-align: center;" 
               title="The numeric rating for this item (e.g., Edge dots, Specialty bonus)." />
        
        <p class="notes px-2 italic small">
            The base numeric value used for rolls or requirements.
        </p>
    </div>

</div>
