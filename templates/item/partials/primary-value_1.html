{{!-- Item Secondary/Alternative Value Partial - Foundry V13 Compliant --}}
<div class="form-group primary-value-alt-setting mb-2">
    
    <label class="resource-label font-weight-bold">Secondary Rating / Value</label>
    
    <div class="form-fields flexrow flex-center">
        {{!-- V13 Data Path: system.value1 --}}
        <input type="number" 
               name="system.value1" 
               value="{{system.value1}}" 
               data-dtype="Number" 
               placeholder="0" 
               style="max-width: 3rem; text-align: center;" 
               title="An alternative or secondary numeric rating for this item." />
        
        <p class="notes px-2 italic small">
            A secondary numeric field for items requiring multiple ratings.
        </p>
    </div>

</div>
