{{!-- Item Roll Configuration Toggle - Foundry V13 Compliant --}}
<div class="roll-flag-setting border p-2 mb-2">
    
    <div class="form-group flexrow flex-between mb-1">
        <label class="resource-label font-weight-bold">Enable Item Roll?</label>
        {{!-- V13 Data Path: system.flags.isRollable --}}
        <input type="checkbox" 
               name="system.flags.isRollable" 
               {{checked system.flags.isRollable}} 
               data-dtype="Boolean" />
    </div>

    {{#if system.flags.isRollable}}
    <div class="roll-details mt-2 p-1 border-top">
        {{!-- Attribute Selection --}}
        <div class="form-group flexrow mb-1">
            <label class="small-label">Default Attribute</label>
            <select name="system.roll.attribute">
                {{#select system.roll.attribute}}
                <option value="">None</option>
                <option value="might">Might</option>
                <option value="dexterity">Dexterity</option>
                <option value="stamina">Stamina</option>
                <option value="intellect">Intellect</option>
                <option value="cunning">Cunning</option>
                <option value="resolve">Resolve</option>
                <option value="presence">Presence</option>
                <option value="manipulation">Manipulation</option>
                <option value="composure">Composure</option>
                {{/select}}
            </select>
        </div>

        {{!-- Skill Selection --}}
        <div class="form-group flexrow mb-1">
            <label class="small-label">Default Skill</label>
            <select name="system.roll.skill">
                {{#select system.roll.skill}}
                <option value="">None</option>
                <option value="aim">Aim</option>
                <option value="athletics">Athletics</option>
                <option value="closeCombat">Close Combat</option>
                <option value="command">Command</option>
                <option value="culture">Culture</option>
                <option value="empathy">Empathy</option>
                <option value="enigmas">Enigmas</option>
                <option value="humanities">Humanities</option>
                <option value="integrity">Integrity</option>
                <option value="leadership">Leadership</option>
                <option value="medicine">Medicine</option>
                <option value="persuasion">Persuasion</option>
                <option value="pilot">Pilot</option>
                <option value="science">Science</option>
                <option value="survival">Survival</option>
                <option value="technology">Technology</option>
                {{/select}}
            </select>
        </div>

        {{!-- V13 Data Path: system.roll.bonus --}}
        <div class="form-group flexrow">
            <label class="small-label">Flat Bonus</label>
            <input type="number" name="system.roll.bonus" value="{{system.roll.bonus}}" data-dtype="Number" placeholder="0" />
        </div>
    </div>
    {{/if}}

</div>
