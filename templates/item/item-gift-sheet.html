<form class="trinity-app {{cssClass}} flexcol" autocomplete="off">
    <header class="sheet-header flexrow p-1 border-bottom align-center">
        <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" height="64" width="64" style="object-fit: cover; flex: 0 0 auto; border-radius: 3px;"/>
        <div class="header-fields flexcol w-100 mx-1">
            <h1 class="charname m-0">
                <input name="name" type="text" value="{{item.name}}" placeholder="Gift Name"/>
            </h1>
        </div>
    </header>

    <section class="sheet-body p-1 flexcol" style="flex: 1 1 auto; overflow-y: auto;">
        <div class="grid grid-2col gap-10 mb-1">
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Keywords</label>
                <input type="text" name="system.keywords" value="{{system.keywords}}" placeholder="e.g. Momentary, Action..."/>
            </div>
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Prerequisite</label>
                <input type="text" name="system.prerequisite" value="{{system.prerequisite}}" placeholder="e.g. Inspiration 2..."/>
            </div>
        </div>

        <div class="form-group flexcol mt-1" style="flex: 1;">
            <label class="font-weight-bold text-blue mb-1">Description</label>
            <div class="editor border p-1" style="background: rgba(0,0,0,0.02); min-height: 200px; height: 100%; border-radius: 5px;">
                <prose-mirror name="system.description" value="{{system.description}}" toggled="true" collaborate="false">
                    {{{enrichedDescription}}}
                </prose-mirror>
            </div>
        </div>
    </section>
</form>
