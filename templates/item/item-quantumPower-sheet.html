<form class="trinity-app {{cssClass}} flexcol" autocomplete="off">
    <header class="sheet-header flexrow p-1 border-bottom align-center">
        <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" height="64" width="64" style="object-fit: cover; flex: 0 0 auto; border-radius: 3px;"/>
        <div class="header-fields flexcol w-100 mx-1">
            <h1 class="charname m-0">
                <input name="name" type="text" value="{{item.name}}" placeholder="Quantum Power Name"/>
            </h1>
        </div>
    </header>

    <section class="sheet-body p-1 flexcol" style="flex: 1 1 auto; overflow-y: auto;">
        <div class="form-group flexrow align-center border p-1 mb-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
            <label class="font-weight-bold text-blue mr-1">Rating</label>
            <div class="pip-container" data-name="system.value" data-value="{{system.value}}">
                <i class="pip {{#if (gt system.value 0)}}fas{{else}}far{{/if}} fa-circle" data-index="1"></i>
                <i class="pip {{#if (gt system.value 1)}}fas{{else}}far{{/if}} fa-circle" data-index="2"></i>
                <i class="pip {{#if (gt system.value 2)}}fas{{else}}far{{/if}} fa-circle" data-index="3"></i>
                <i class="pip {{#if (gt system.value 3)}}fas{{else}}far{{/if}} fa-circle" data-index="4"></i>
                <i class="pip {{#if (gt system.value 4)}}fas{{else}}far{{/if}} fa-circle" data-index="5"></i>
            </div>
        </div>
        
        <div class="grid grid-2col gap-10 mb-1">
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Action</label>
                <input type="text" name="system.action" value="{{system.action}}" placeholder="e.g. Simple, Reflexive..."/>
            </div>
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Cost</label>
                <input type="text" name="system.cost" value="{{system.cost}}" placeholder="e.g. 1 Quantum..."/>
            </div>
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Dice Pool</label>
                <input type="text" name="system.dicePool" value="{{system.dicePool}}" placeholder="e.g. Quantum + Might..."/>
            </div>
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Range</label>
                <input type="text" name="system.range" value="{{system.range}}" placeholder="e.g. Short, Visual..."/>
            </div>
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Duration</label>
                <input type="text" name="system.duration" value="{{system.duration}}" placeholder="e.g. Instant, Scene..."/>
            </div>
            <div class="form-group flexcol border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
                <label class="font-weight-bold text-blue">Tags</label>
                <input type="text" name="system.tags" value="{{system.tags}}" placeholder="e.g. Destructive, Subtle..."/>
            </div>
        </div>

        <div class="form-group flexcol mt-1" style="flex: 1;">
            <label class="font-weight-bold text-blue mb-1">Description</label>
            <div class="editor border p-1" style="background: rgba(0,0,0,0.02); min-height: 200px; height: 100%; border-radius: 5px;">
                <prose-mirror name="system.description" value="{{system.description}}" toggled="true" collaborate="false">
                    {{{enrichedDescription}}}
                </prose-mirror>
            </div>
        </div>
    </section>
</form>
