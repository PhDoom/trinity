<form class="trinity-app {{cssClass}} flexcol" autocomplete="off">
    <header class="sheet-header flexrow p-1 border-bottom align-center">
        <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" height="64" width="64" style="object-fit: cover; flex: 0 0 auto; border-radius: 3px;"/>
        <div class="header-fields flexcol w-100 mx-1">
            <h1 class="charname m-0">
                <input name="name" type="text" value="{{item.name}}" placeholder="Gear Name"/>
            </h1>
        </div>
    </header>

    <section class="sheet-body p-1 flexcol" style="flex: 1 1 auto; overflow-y: auto;">
        <div class="form-group flexcol mb-1 border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
            <label class="font-weight-bold text-blue">Enhancement</label>
            <input type="number" name="system.enhancement" value="{{system.enhancement}}" data-dtype="Number" style="width: 100px; text-align: center;"/>
        </div>

        <div class="form-group flexcol mb-1 border p-1" style="border-radius: 5px; background: rgba(0,0,0,0.02);">
            <label class="font-weight-bold text-blue mb-1">Tags & Special Rules</label>
            <input type="text" name="system.tags" value="{{system.tags}}" placeholder="Enter gear tags here..."/>
        </div>

        <div class="form-group flexcol h-100 mt-1">
            <label class="font-weight-bold text-blue mb-1">Description</label>
            <div class="p-1 border" style="background: rgba(0,0,0,0.02); min-height: 200px; height: 100%;">
                {{editor system.description target="system.description" button=true editable=true engine="prosemirror"}}
            </div>
        </div>
    </section>
</form>
