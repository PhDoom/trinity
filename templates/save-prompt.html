{{!-- Trinity Quick Save Prompt - Foundry V13 Compliant --}}
<form class="trinity-dialog save-prompt" autocomplete="off">
  
  {{!-- Dialog Header --}}
  <header class="dialog-header border-bottom mb-2 trinity-flexrow trinity-flex-between p-2">
    <h3 class="m-0">Quick Save Action</h3>
  </header>

  {{!-- Action Name --}}
  <div class="form-group mb-2">
    <label class="small-label font-weight-bold">Assign Name</label>
    <input type="text" name="name" value="{{name}}" placeholder="Action Name" class="w-100"/>
  </div>

  {{!-- Status Grid --}}
  <div class="trinity-grid trinity-grid-2col border-top pt-2">
    
    <div class="trinity-flexcol trinity-flex-center p-1">
      <span class="small-label">Base Dice</span>
      <span class="font-weight-bold text-blue">{{pool}}</span>
    </div>

    <div class="trinity-flexcol trinity-flex-center p-1">
      <span class="small-label">Difficulty</span>
      <span class="font-weight-bold text-red">{{difficulty}}</span>
    </div>

  </div>

  {{!-- Confirmation Footer --}}
  <div class="trinity-flexcol mt-2 border-top pt-2">
    <p class="small text-center italic">
      This action will be added to your character's stored actions list.
    </p>
  </div>

</form>
